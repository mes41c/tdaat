name: Deploy to GitHub Pages

on:
  push:
    branches: [ ana, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - - name: Set up Node.js
  uses: actions/setup-node@v4
  with:
    node-version: "20"  # LTS versiyonu
    cache: npm

- name: Build project
  run: npm run build

- name: Verify dist folder exists
  run: test -d ./dist || (echo "Build failed - dist folder not found" && exit 1)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
